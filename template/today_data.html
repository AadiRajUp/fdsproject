{% extends "base.html" %}

{% block title %}Today's Data | Productivity Tracker{% endblock %}

{% block content %}
<section class="card">
    <h1>Today's Data</h1>
    <p class="subtext">Date is captured automatically for today. Enter the details below.</p>

    {% if error %}
    <p class="error-text">{{ error }}</p>
    {% endif %}

    <form class="form" method="post" action="{{ url_for('today_data') }}">
        <p class="subtext"><strong>Date:</strong> {{ today_date }}</p>

        <label for="study_hours">Study Hours (today)</label>
        <input type="number" id="study_hours" name="study_hours" min="0" max="24" step="0.5" placeholder="e.g. 6.5" value="{{ form_data.get('study_hours', '') }}" required>

        <label for="focus_score">Focus Score (0-100)</label>
        <input type="number" id="focus_score" name="focus_score" min="0" max="100" placeholder="e.g. 78" value="{{ form_data.get('focus_score', '') }}" required>

        <label for="sleep_hours">Sleep Hours</label>
        <input type="number" id="sleep_hours" name="sleep_hours" min="0" max="24" step="0.5" placeholder="e.g. 7.5" value="{{ form_data.get('sleep_hours', '') }}" required>

        <label for="phone_usage_hours">Phone Usage Hours</label>
        <input type="number" id="phone_usage_hours" name="phone_usage_hours" min="0" max="24" step="0.5" placeholder="e.g. 3" value="{{ form_data.get('phone_usage_hours', '') }}" required>

        <button type="submit" class="btn">Submit Today's Data</button>
    </form>
</section>
{% endblock %}
